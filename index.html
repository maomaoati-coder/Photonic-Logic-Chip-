<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLC Designer v1.0 — Photonic Logic EDA</title>
<style>
:root{--gold:#C9A84C;--bg:#020810;--panel:#070c18;--border:#1a2040;
--green:#00FFA3;--cyan:#00E5FF;--orange:#FF8C00;--violet:#A855F7;
--red:#FF4466;--text:#e0eaff;--dim:#445577;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);
font-family:'Courier New',monospace;min-height:100vh;padding:16px;}
.header{text-align:center;border-bottom:2px solid var(--gold);
padding-bottom:12px;margin-bottom:16px;}
.header h1{color:var(--gold);font-size:20px;letter-spacing:3px;}
.header p{color:var(--dim);font-size:10px;margin-top:4px;letter-spacing:2px;}
.input-section{background:var(--panel);border:1px solid var(--border);
padding:12px;margin-bottom:12px;}
.input-section label{color:var(--gold);font-size:10px;letter-spacing:2px;
display:block;margin-bottom:6px;}
textarea{width:100%;height:70px;background:#000;color:var(--green);
border:1px solid var(--border);padding:8px;
font-family:'Courier New',monospace;font-size:14px;resize:none;outline:none;}
.presets{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.preset-btn{background:transparent;border:1px solid var(--border);
color:var(--dim);padding:4px 8px;font-size:9px;cursor:pointer;
font-family:'Courier New',monospace;letter-spacing:1px;}
.preset-btn:hover{border-color:var(--gold);color:var(--gold);}
.run-btn{width:100%;padding:14px;background:var(--gold);color:#000;
border:none;font-size:13px;font-weight:bold;cursor:pointer;
letter-spacing:3px;margin-bottom:12px;font-family:'Courier New',monospace;}
.run-btn:hover{background:#e0c060;}
#vizCanvas{width:100%;height:220px;background:#000;
border:1px solid var(--border);display:block;margin-bottom:12px;}
.results{background:var(--panel);border:1px solid var(--border);
padding:12px;margin-bottom:12px;}
.results-title{color:var(--green);font-size:10px;letter-spacing:2px;
border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:10px;}
.node-card{border-bottom:1px solid var(--border);padding:8px 0;}
.node-card:last-child{border-bottom:none;}
.node-header{display:flex;justify-content:space-between;
align-items:center;margin-bottom:6px;}
.node-type{font-size:11px;font-weight:bold;padding:2px 8px;border-radius:2px;}
.node-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:9px;}
.metric{background:#0a1020;padding:6px;border-left:2px solid var(--border);}
.metric-label{color:var(--dim);margin-bottom:2px;}
.metric-value{color:#fff;font-size:11px;}
.opa-section{background:var(--panel);border:1px solid var(--border);
padding:12px;margin-bottom:12px;}
.opa-title{color:var(--cyan);font-size:10px;letter-spacing:2px;margin-bottom:8px;}
.opa-table{font-size:9px;width:100%;border-collapse:collapse;}
.opa-table th{color:var(--dim);padding:4px 6px;
border-bottom:1px solid var(--border);text-align:left;}
.opa-table td{padding:4px 6px;border-bottom:1px solid #0a1020;color:var(--text);}
.opa-table tr:last-child td{border-bottom:none;}
.energy-bar-wrap{background:#0a1020;height:4px;margin-top:4px;
border-radius:2px;overflow:hidden;}
.energy-bar{height:100%;border-radius:2px;transition:width 0.3s;}
.footer{text-align:center;color:var(--dim);font-size:9px;
padding-top:8px;border-top:1px solid var(--border);
letter-spacing:1px;line-height:1.8;}
.relay-badge{background:#C9A84C22;border:1px solid var(--gold);
color:var(--gold);font-size:9px;padding:1px 6px;margin-left:6px;}
</style>
</head>
<body>
<div class="header">
  <h1>PLC DESIGNER v1.0</h1>
  <p>PHOTONIC LOGIC COMPUTING — EDA TOOL</p>
  <p>INVENTOR: MAOMAO (毛广辉) · DOI: 10.5281/zenodo.19801651</p>
</div>
<div class="input-section">
  <label>LOGIC EXPRESSION INPUT</label>
  <textarea id="exprInput">(A AND B) OR (NOT C)
